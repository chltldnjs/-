<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | 최시원</title>
    <meta name="description" content="축구 팬 최시원 방문록 및 연락처">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Siwon.Football</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About Me</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>
    <main>
        <div class="container fade-in">
            <h2><span class="text-gradient">Get In Touch</span></h2>
            <div class="glass-card fade-in delay-1">
                <p style="text-align: center; margin-bottom: 2rem;">축구와 관련된 어떤 이야기든 환영합니다. 매치 리뷰 토론, 직관 메이트, 혹은 단순한 팬심 가득한 이야기까지 모두 남겨주세요!</p>
                <form id="contactForm" class="contact-form fade-in delay-2">
                    <div class="form-group">
                        <label for="name">이름 (Name)</label>
                        <input type="text" id="name" class="form-control" placeholder="홍길동" required autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label for="email">이메일 (Email)</label>
                        <input type="email" id="email" class="form-control" placeholder="example@email.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="message">메시지 (Message)</label>
                        <textarea id="message" class="form-control" placeholder="여기에 내용을 입력하세요..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin: 0; margin-top: 1rem; width: 100%;">메시지 보내기</button>
                </form>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
