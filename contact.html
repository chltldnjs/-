<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | 최시원</title>
    <meta name="description" content="시야를 바꾸는 축구 인사이트와 전술 분석. 최시원의 프리미엄 축구 블로그입니다.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Siwon.Insight</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>
    <main>
        <div class="content-section fade-in">
            <h2 style="text-align: center; margin-bottom: 4rem;"><span class="text-gradient">Get In Touch</span></h2>
            
            <div class="contact-wrapper glass-card">
                <div class="contact-info-card fade-in delay-1">
                    <h3 style="margin-bottom: 2rem; font-size: 1.8rem; letter-spacing: -0.5px;">Let's Talk Football.</h3>
                    <p style="margin-bottom: 3rem; font-size: 1.05rem;">데이터 분석 의뢰, 칼럼 기고 제안부터 단순한 매치 리뷰 토론이나 직관 메이트까지. 축구와 관련된 모든 창의적인 논의와 협업을 환영합니다.</p>
                    
                    <div class="info-item">
                        <h4>Direct Email</h4>
                        <p>tactics.siwon@example.com</p>
                    </div>
                    
                    <div class="info-item">
                        <h4>Social Presence</h4>
                        <p style="font-weight: 300;">
                            <a href="#" style="color: var(--text-primary); text-decoration: none; border-bottom: 1px solid #d4af37; margin-right: 1rem; padding-bottom: 2px;">Twitter / X</a>
                            <a href="#" style="color: var(--text-primary); text-decoration: none; border-bottom: 1px solid #d4af37; padding-bottom: 2px;">LinkedIn (Analytics)</a>
                        </p>
                    </div>
                </div>

                <div class="fade-in delay-2">
                    <form id="contactForm" class="contact-form">
                        <div class="form-group">
                            <label for="name">Name / Organization</label>
                            <input type="text" id="name" class="form-control" placeholder="YOUR NAME" required autocomplete="name">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" class="form-control" placeholder="YOUR@EMAIL.COM" required autocomplete="email">
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject / Purpose</label>
                            <input type="text" id="subject" class="form-control" placeholder="e.g., Data Analysis Collab, Column Request" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" class="form-control" placeholder="How can we collaborate on the pitch?" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="margin-top: 1rem; width: 100%;">Send Inquiry</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
